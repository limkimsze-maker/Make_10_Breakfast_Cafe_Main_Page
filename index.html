<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Breakfast Cafe:Make 10 all the Way!</title>

  <link rel="preload" as="image" href="breakfast_cafe_cover.png" fetchpriority="high" />
  <link rel="preload" as="audio" href="breakfast_cafe.mp3" type="audio/mpeg" />

  <style>
    :root{
      --bg1:#120014;
      --bg2:#1d0626;
      --btnBlue1:#34a3ff;
      --btnBlue2:#0b63d1;
      --btnGreen1:#4fe66d;
      --btnGreen2:#189a38;
      --text:#fff6d9;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:"Arial Rounded MT Bold","Trebuchet MS","Comic Sans MS",sans-serif;
      background:
        radial-gradient(circle at 50% 30%, #5a1200 0%, transparent 25%),
        radial-gradient(circle at 20% 20%, #3c0720 0%, transparent 22%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      color:white;
    }

    body{
      min-height:100vh;
      min-height:100dvh;
    }

    .page{
      position:relative;
      width:100%;
      height:100vh;
      height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:0;
    }

    .spark{
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      background:#ffd65c;
      box-shadow:0 0 12px #ffb300, 0 0 24px #ff6a00;
      opacity:.8;
      animation:twinkle 2.8s ease-in-out infinite;
      pointer-events:none;
      z-index:1;
    }
    .spark:nth-child(1){top:8%; left:10%; animation-delay:.2s;}
    .spark:nth-child(2){top:14%; left:82%; animation-delay:1.1s;}
    .spark:nth-child(3){top:22%; left:20%; animation-delay:.7s;}
    .spark:nth-child(4){top:30%; left:88%; animation-delay:1.8s;}
    .spark:nth-child(5){top:70%; left:12%; animation-delay:.4s;}
    .spark:nth-child(6){top:80%; left:85%; animation-delay:1.4s;}
    .spark:nth-child(7){top:88%; left:26%; animation-delay:2s;}
    .spark:nth-child(8){top:10%; left:50%; animation-delay:.9s;}

    @keyframes twinkle{
      0%,100%{transform:scale(.5); opacity:.35;}
      50%{transform:scale(1.35); opacity:1;}
    }

    .card{
      position:relative;
      width:100vw;
      height:100vh;
      height:100dvh;
      overflow:hidden;
      background:#17051f;
      box-shadow:inset 0 0 0 3px rgba(255,170,40,.14);
      z-index:2;
    }

    .cover-back{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center center;
      display:block;
      filter:blur(16px) brightness(.42) saturate(1.05);
      transform:scale(1.08);
    }

    .cover-stage{
      position:absolute;
      inset:0;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:
        max(56px, calc(env(safe-area-inset-top) + 16px))
        clamp(10px, 2vw, 22px)
        max(170px, calc(env(safe-area-inset-bottom) + 130px));
    }

    .cover{
      width:100%;
      height:100%;
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      object-position:center center;
      display:block;
      filter:saturate(1.05) contrast(1.02);
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }

    .overlay{
      position:absolute;
      inset:0;
      z-index:2;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.08), rgba(0,0,0,.14) 45%, rgba(0,0,0,.30)),
        radial-gradient(circle at center, transparent 35%, rgba(0,0,0,.22) 100%);
      pointer-events:none;
    }

    .top-hint{
      position:absolute;
      top:max(12px, calc(env(safe-area-inset-top) + 8px));
      left:50%;
      transform:translateX(-50%);
      z-index:4;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(0,0,0,.38);
      color:#fff4cc;
      font-weight:800;
      font-size:clamp(12px, 1vw, 16px);
      letter-spacing:.2px;
      backdrop-filter:blur(4px);
      box-shadow:0 0 0 1px rgba(255,255,255,.1) inset;
      text-align:center;
      width:max-content;
      max-width:calc(100% - 24px);
    }

    .button-wrap{
      position:absolute;
      left:50%;
      bottom:max(18px, calc(env(safe-area-inset-bottom) + 10px));
      transform:translateX(-50%);
      width:min(900px, calc(100% - 28px));
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      z-index:5;
    }

    .mode-btn{
      appearance:none;
      border:none;
      border-radius:22px;
      padding:18px 18px;
      min-height:84px;
      cursor:pointer;
      font-size:clamp(22px, 2.1vw, 36px);
      line-height:1.05;
      font-weight:900;
      color:var(--text);
      text-shadow:0 2px 0 rgba(0,0,0,.35);
      box-shadow:
        0 10px 0 rgba(0,0,0,.28),
        0 18px 28px rgba(0,0,0,.28),
        inset 0 2px 0 rgba(255,255,255,.35),
        inset 0 -4px 0 rgba(0,0,0,.18);
      transition:transform .12s ease, filter .12s ease, opacity .18s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      position:relative;
      z-index:4;
      text-align:center;
    }

    .mode-btn:hover{
      transform:translateY(-2px) scale(1.01);
      filter:brightness(1.04);
    }

    .mode-btn:active{
      transform:translateY(5px) scale(.995);
      box-shadow:
        0 5px 0 rgba(0,0,0,.28),
        0 10px 18px rgba(0,0,0,.24),
        inset 0 2px 0 rgba(255,255,255,.30),
        inset 0 -3px 0 rgba(0,0,0,.18);
    }

    .mode-btn[disabled]{
      cursor:default;
      opacity:.78;
      transform:none;
      filter:none;
    }

    .desktop{
      background:linear-gradient(180deg, var(--btnBlue1), var(--btnBlue2));
    }

    .mobile{
      background:linear-gradient(180deg, var(--btnGreen1), var(--btnGreen2));
    }

    .icon{
      font-size:1.05em;
      filter:drop-shadow(0 2px 0 rgba(0,0,0,.25));
    }

    .status{
      position:absolute;
      left:50%;
      bottom:max(118px, calc(env(safe-area-inset-bottom) + 102px));
      transform:translateX(-50%);
      z-index:5;
      width:min(560px, calc(100% - 28px));
      padding:10px 18px;
      text-align:center;
      font-weight:900;
      font-size:clamp(16px, 1.3vw, 22px);
      color:#fff4cc;
      text-shadow:0 2px 0 rgba(0,0,0,.35);
      border-radius:18px;
      background:rgba(0,0,0,.34);
      backdrop-filter:blur(4px);
      box-shadow:0 0 0 1px rgba(255,255,255,.08) inset;
      opacity:0;
      transition:opacity .2s ease;
      pointer-events:none;
    }

    .status.show{
      opacity:1;
    }

    .credit{
      position:absolute;
      right:12px;
      top:max(52px, calc(env(safe-area-inset-top) + 44px));
      z-index:5;
      font-size:12px;
      color:rgba(255,255,255,.92);
      text-shadow:0 1px 2px rgba(0,0,0,.45);
      background:rgba(0,0,0,.25);
      padding:5px 9px;
      border-radius:10px;
    }

    @media (max-width: 900px){
      .button-wrap{
        width:calc(100% - 24px);
        gap:12px;
      }

      .mode-btn{
        min-height:74px;
        padding:16px 12px;
        font-size:clamp(19px, 4.5vw, 28px);
        border-radius:18px;
      }

      .status{
        width:calc(100% - 24px);
        font-size:clamp(14px, 4vw, 18px);
      }

      .top-hint{
        width:calc(100% - 20px);
        font-size:clamp(11px, 3.2vw, 14px);
      }

      .credit{
        top:auto;
        right:10px;
        bottom:max(108px, calc(env(safe-area-inset-bottom) + 96px));
      }
    }

    @media (max-width: 560px){
      .button-wrap{
        grid-template-columns:1fr;
      }

      .cover-stage{
        padding:
          max(54px, calc(env(safe-area-inset-top) + 14px))
          10px
          max(240px, calc(env(safe-area-inset-bottom) + 196px));
      }

      .status{
        bottom:max(188px, calc(env(safe-area-inset-bottom) + 176px));
      }

      .credit{
        bottom:max(192px, calc(env(safe-area-inset-bottom) + 180px));
      }
    }

    @media (max-height: 620px){
      .cover-stage{
        padding:
          max(46px, calc(env(safe-area-inset-top) + 10px))
          10px
          max(140px, calc(env(safe-area-inset-bottom) + 108px));
      }

      .mode-btn{
        min-height:60px;
        padding:12px 10px;
        font-size:clamp(16px, 3.2vw, 22px);
        border-radius:16px;
      }

      .button-wrap{
        gap:10px;
        bottom:max(10px, calc(env(safe-area-inset-bottom) + 6px));
      }

      .status{
        bottom:max(80px, calc(env(safe-area-inset-bottom) + 74px));
        padding:8px 14px;
        font-size:clamp(12px, 2.4vw, 16px);
      }

      .credit{
        display:none;
      }
    }
  </style>
  <script src="https://cdn.counter.dev/script.js" data-id="825e93b6-ce99-40ef-8bcc-125f13297433" data-utcoffset="8"></script>
</head>
<body>
  <div class="page">
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>

    <div class="card">
      <img class="cover-back" src="breakfast_cafe_cover.png" alt="" aria-hidden="true" />

      <div class="cover-stage">
        <img class="cover" src="breakfast_cafe_cover.png" alt="Breakfast Cafe:Make 10 all the Way! cover" />
      </div>

      <div class="overlay"></div>

      <div class="top-hint">Choose a mode to hear “Breakfast Cafe:Make 10 all the Way!” and begin</div>

      <div class="status" id="statusText">Loading...</div>

      <div class="button-wrap">
        <button class="mode-btn desktop" id="desktopBtn" type="button" aria-label="Open Desktop Mode">
          <span class="icon">🖥️</span>
          <span>Desktop Mode!</span>
        </button>

        <button class="mode-btn mobile" id="mobileBtn" type="button" aria-label="Open Mobile Mode">
          <span class="icon">📱</span>
          <span>Mobile Mode!</span>
        </button>
      </div>

      <div class="credit">Designed by Lim Kim Sze © 2026</div>
    </div>
  </div>

  <audio id="breakfastAudio" preload="auto" playsinline>
    <source src="breakfast_cafe.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const DESKTOP_MODE_LINK = "https://limkimsze-maker.github.io/P1_Make_10_Breakfast_Cafe_Desktop/";
    const MOBILE_MODE_LINK  = "https://limkimsze-maker.github.io/P3-Equivalent-Fraction-Mobile/";

    const desktopBtn = document.getElementById("desktopBtn");
    const mobileBtn = document.getElementById("mobileBtn");
    const breakfastAudio = document.getElementById("breakfastAudio");
    const statusText = document.getElementById("statusText");

    let modeChosen = false;
    let chosenLink = "";

    breakfastAudio.load();

    function disableButtons() {
      desktopBtn.disabled = true;
      mobileBtn.disabled = true;
    }

    function showStatus(text) {
      statusText.textContent = text;
      statusText.classList.add("show");
    }

    function goTo(link) {
      window.location.href = link;
    }

    function startMode(link, label) {
      if (modeChosen) return;
      modeChosen = true;
      chosenLink = link;

      disableButtons();
      showStatus(`Breakfast Cafe:Make 10 all the Way! Opening ${label}...`);

      breakfastAudio.pause();
      breakfastAudio.currentTime = 0;

      const onEnded = () => {
        goTo(chosenLink);
      };

      breakfastAudio.addEventListener("ended", onEnded, { once: true });

      breakfastAudio.play().catch(() => {
        goTo(chosenLink);
      });
    }

    desktopBtn.addEventListener("click", () => {
      startMode(DESKTOP_MODE_LINK, "Desktop Mode");
    });

    mobileBtn.addEventListener("click", () => {
      startMode(MOBILE_MODE_LINK, "Mobile Mode");
    });
  </script>
</body>
</html>
